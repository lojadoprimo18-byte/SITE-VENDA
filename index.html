        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding-top: 0;
        }

        /* ============================================
           CABEÇALHO FIXO - ESTILO LIMPO E MODERNO
           ============================================ */
        .header-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }

        /* Banner Superior */
        .banner-topo {
            width: 100%;
            height: 190px;
            background: #0b3472;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .banner-topo img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Conteúdo do Cabeçalho */
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            background: #ffffff;
        }

        /* Logo */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-container img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .logo-texto {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .logo-texto .nome {
            font-size: 16px;
            font-weight: 800;
            color: #0b3472;
            letter-spacing: -0.5px;
        }

        .logo-texto .slogan {
            font-size: 10px;
            font-weight: 500;
            color: #666;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* Barra de Busca */
        .busca-wrapper {
            position: relative;
            flex: 1;
            max-width: 450px;
        }

        .busca-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
        }

        .barra-busca {
            width: 100%;
            padding: 8px 15px 8px 40px;
            border: 2px solid #e8ecf0;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            background: #f8f9fa;
            color: #333;
            transition: all 0.3s ease;
        }

        .barra-busca:focus {
            border-color: #0b3472;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 52, 114, 0.1);
        }

        .barra-busca::placeholder {
            color: #aaa;
        }

        /* Contato WhatsApp */
        .contato-whatsapp {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #25d366;
            color: #fff;
            padding: 7px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .contato-whatsapp:hover {
            background: #1ebe5a;
            transform: scale(1.02);
        }

        .contato-whatsapp i {
            font-size: 16px;
        }

        /* ============================================
           CATEGORIAS (ABAIXO DO CABEÇALHO)
           ============================================ */
        .categorias-container {
            background: #ffffff;
            border-top: 1px solid #f0f2f5;
            padding: 6px 20px;
            overflow-x: auto;
        }

        .categorias {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .categorias::-webkit-scrollbar {
            display: none;
        }

        .btn-categoria {
            background: transparent;
            border: none;
            color: #555;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-categoria:hover {
            background: #f0f2f5;
            color: #0b3472;
        }

        .btn-categoria.ativo {
            background: #0b3472;
            color: #ffffff;
            font-weight: 600;
        }

        /* ============================================
           GRADE DE PRODUTOS
           ============================================ */
        .container {
            max-width: 1200px;
            margin: 240px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .produto-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            border: 1px solid #f0f2f5;
        }

        .produto-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            border-color: #dce0e5;
        }

        .imagem-container {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafbfc;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .produto-imagem {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .produto-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 8px;
        }

        .produto-titulo {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            color: #1a1a2e;
            min-height: 40px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .produto-preco-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .preco-antigo {
            color: #999;
            text-decoration: line-through;
            font-size: 13px;
        }

        .produto-preco {
            font-size: 20px;
            font-weight: 700;
            color: #16a34a;
        }

        .produto-preco small {
            font-size: 13px;
            font-weight: 400;
            color: #666;
        }

        .badge-desconto {
            background: #dc2626;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 4px;
            display: inline-block;
            align-self: flex-start;
        }

        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            text-decoration: none;
            text-align: center;
            padding: 10px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }

        .btn-whatsapp:hover {
            background: #1ebe5a;
            transform: scale(1.02);
        }

        .mensagem-vazio {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
            display: none;
        }

        .mensagem-vazio i {
            font-size: 48px;
            color: #ddd;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================
           RESPONSIVIDADE
           ============================================ */
        @media (max-width: 1024px) {
            .container {

            }
        }

            .header-content {

            .btn-categoria {

            .imagem-container {

            .produto-titulo {

                min-height: 34px;

            .produto-preco {

        }

            .imagem-container {

            .produto-titulo {
                font-size: 12px;
                min-height: 30px;
            }

            .produto-preco {
                font-size: 15px;
            }

            .btn-whatsapp {
                font-size: 11px;
                padding: 8px 10px;
            }
        }
    </style>
</head>

        // ==========================================
        // FUNÇÕES
        // ==========================================
        const container = document.getElementById('lista-produtos');
        const inputBusca = document.getElementById('busca');
        const mensagemVazio = document.getElementById('mensagem-vazio');
        let categoriaAtual = 'todos';
        let termoBusca = '';

        function renderizarProdutos(lista) {
            container.innerHTML = '';

            if (lista.length === 0) {
                mensagemVazio.style.display = 'block';
                return;
            }

            mensagemVazio.style.display = 'none';

            lista.forEach(produto => {
                const card = document.createElement('div');
                card.className = 'produto-card';

                let precoHTML = '';
                if (produto.precoAntigo) {
                    precoHTML = `
                        <div class="produto-preco-container">
                            <span class="preco-antigo">De: ${produto.precoAntigo}</span>
                            <span class="produto-preco">Por: ${produto.preco}</span>
                            ${produto.desconto ? `<span class="badge-desconto">${produto.desconto}</span>` : ''}
                        </div>
                    `;
                } else {
                    precoHTML = `
                        <div class="produto-preco-container">
                            <span class="produto-preco">${produto.preco}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="imagem-container">
                        <img src="${produto.imagem}" 
                             alt="${produto.nome}" 
                             class="produto-imagem"
                             loading="lazy"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f0f2f5%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2230%22 y=%2250%22 fill=%22%23999%22 font-size=%2210%22 font-family=%22Arial%22%3ESem imagem%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="produto-info">
                        <h3 class="produto-titulo">${produto.nome}</h3>
                        ${precoHTML}
                        <a href="${produto.link}" target="_blank" class="btn-whatsapp">
                            <i class="fab fa-whatsapp"></i> Pedir no WhatsApp
                        </a>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function filtrarProdutos() {
            const termo = termoBusca.toLowerCase().trim();
            
            const filtrados = produtos.filter(produto => {
                const nomeMatch = produto.nome.toLowerCase().includes(termo);
                const categoriaMatch = categoriaAtual === 'todos' || produto.categoria === categoriaAtual;
                return nomeMatch && categoriaMatch;
            });

            renderizarProdutos(filtrados);
        }

        // ==========================================
        // EVENTOS
        // ==========================================

        inputBusca.addEventListener('input', (e) => {
            termoBusca = e.target.value;
            filtrarProdutos();
        });

        document.querySelector('.categorias').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-categoria');
            if (!btn) return;

            document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');

            categoriaAtual = btn.dataset.categoria;
            filtrarProdutos();
        });

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        renderizarProdutos(produtos);
    </script>
